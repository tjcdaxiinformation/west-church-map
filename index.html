<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真耶穌教會西區地圖標籤導航</title>
    
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 載入 React 核心 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 載入 Babel (用於編譯 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 載入 Lucide React 圖示庫 (UMD 版本) -->
    <script src="https://unpkg.com/lucide-react"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            margin: 0;
            padding: 0;
        }
        /* 預防空白：載入中動畫 */
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="loader"><div class="spinner"></div></div>
    <div id="root"></div>

    <script type="text/babel">
        // 確保從 lucideReact 全域變數提取圖示
        const { 
            MapPin, Navigation, Search, Filter, Globe, 
            ChevronRight, ExternalLink, Info, Map: MapIcon 
        } = lucideReact;

        const App = () => {
            const [selectedZone, setSelectedZone] = React.useState('全部');
            const [searchTerm, setSearchTerm] = React.useState('');
            const [activeChurch, setActiveChurch] = React.useState(null);

            // 隱藏載入動畫
            React.useEffect(() => {
                const loader = document.getElementById('loader');
                if (loader) loader.style.opacity = '0';
                setTimeout(() => { if (loader) loader.style.display = 'none'; }, 500);
            }, []);

            const churchData = [
                // 復興小區
                { zone: "復興小區", note: "前山牧區", name: "八德", address: "33448桃園市八德區瑞發街107巷5弄2號" },
                { zone: "復興小區", note: "前山牧區", name: "崎頂", address: "33546桃園市大溪區仁武里8鄰員林路一段142巷82號" },
                { zone: "復興小區", note: "前山牧區", name: "大溪", address: "33542桃園市大溪區一心里民權東路185巷31號" },
                { zone: "復興小區", note: "前山牧區", name: "復興", address: "33641桃園市復興區澤仁里16鄰詩朗7之1號" },
                { zone: "復興小區", note: "前山牧區", name: "(霞雲)", address: "33643桃園市復興區霞雲里3鄰志繼31號" },
                { zone: "復興小區", note: "中山牧區", name: "義盛", address: "33663桃園市復興區義盛里9鄰義興15號" },
                { zone: "復興小區", note: "中山牧區", name: "(卡普)", address: "33643桃園市復興區義盛里4鄰10號" },
                { zone: "復興小區", note: "中山牧區", name: "大灣", address: "33644桃園市復興區羅浮里8鄰高坡62號" },
                { zone: "復興小區", note: "中山牧區", name: "(奎輝)", address: "33643桃園市復興區奎輝里羅馬路三段397号之1" },
                { zone: "復興小區", note: "中山牧區", name: "雪霧鬧", address: "33644桃園市復興區高義里8鄰雪霧鬧12號" },
                { zone: "復興小區", note: "後山牧區", name: "上巴陵", address: "33644桃園市復興區華陵里9鄰40號" },
                { zone: "復興小區", note: "後山牧區", name: "中巴陵", address: "33644桃園市復興區華陵里8鄰39之3號" },
                { zone: "復興小區", note: "後山牧區", name: "三光", address: "33644桃園市復興區三光里6鄰5之1號" },
                { zone: "復興小區", note: "後山牧區", name: "(高義)", address: "33644桃園市復興區高義里4鄰33之7號" },
                { zone: "復興小區", note: "後山牧區", name: "光華", address: "33644桃園市復興區華陵里6鄰18之3號" },
                { zone: "復興小區", note: "後山牧區", name: "(爺亨)", address: "33644桃園市復興區爺亨32號" },
                
                // 竹苗小區
                { zone: "竹苗小區", note: "尖石後牧區", name: "(養老)", address: "31345新竹縣尖石鄉秀巒村13鄰立園4號" },
                { zone: "竹苗小區", note: "尖石後牧區", name: "(李埔)", address: "31343新竹縣尖石鄉玉峰村3鄰李埔16號" },
                { zone: "竹苗小區", note: "尖石後牧區", name: "那羅", address: "31341新竹縣尖石鄉錦屏村10鄰那羅104號" },
                { zone: "竹苗小區", note: "尖石前牧區", name: "錦屏", address: "31341新竹縣尖石鄉錦屏村2鄰45號" },
                { zone: "竹苗小區", note: "尖石前牧區", name: "(尖石)", address: "31342新竹縣尖石鄉嘉樂村5鄰麥樹仁272號" },
                { zone: "竹苗小區", note: "尖石前牧區", name: "義興", address: "31342新竹縣尖石鄉義興村9鄰馬胎68號" },
                { zone: "竹苗小區", note: "五峰牧區", name: "花園", address: "31141新竹縣五峰鄉花園村6鄰126之1號" },
                { zone: "竹苗小區", note: "五峰牧區", name: "五峰", address: "31141新竹縣五峰鄉大隘村10鄰五峰191號" },
                { zone: "竹苗小區", note: "五峰牧區", name: "桃山", address: "31141新竹縣五峰鄉桃山村1鄰6號" },
                { zone: "竹苗小區", note: "五峰牧區", name: "清泉", address: "31141新竹縣五峰鄉桃山村14鄰清泉228之2號" },
                { zone: "竹苗小區", note: "中港溪牧區", name: "頭份", address: "35142苗栗縣頭份市民權里光華街48號" },
                { zone: "竹苗小區", note: "中港溪牧區", name: "東江", address: "35343苗栗縣南庄鄉南江村東江新邨25鄰50號" },
                { zone: "竹苗小區", note: "中港溪牧區", name: "(東河)", address: "35346苗栗縣南庄鄉東河村東興新邨 129之3號" },

                // 中苗小區
                { zone: "中苗小區", note: "泰安牧區", name: "永安", address: "36545 苗栗縣泰安鄉象鼻村4鄰永安34號" },
                { zone: "中苗小區", note: "泰安牧區", name: "(大安）", address: "36545 苗栗縣泰安鄉象鼻村大安38號" },
                { zone: "中苗小區", note: "泰安牧區", name: "士林", address: "36545 苗栗縣泰安鄉士林村4鄰15之2號" },
                { zone: "中苗小區", note: "泰安牧區", name: "大興", address: "36543苗栗縣泰安鄉大興村6鄰南灣28號" },
                { zone: "中苗小區", note: "東達牧區", name: "達觀", address: "42450 台中市和平區達觀里東崎路一段香川巷2號" },
                { zone: "中苗小區", note: "東達牧區", name: "(竹林)", address: "42450 台中市和平區達觀里東崎路一段竹林巷78號" },
                { zone: "中苗小區", note: "東達牧區", name: "雙崎", address: "42450 台中市和平區自由里東崎路二段62之1號" },
                { zone: "中苗小區", note: "東達牧區", name: "自由", address: "42450 台中市和平區自由里東崎路二段三叉巷6號" },
                { zone: "中苗小區", note: "東達牧區", name: "東勢", address: "42344 台中市東勢區泰昌里泰昌二街91號" },
                { zone: "中苗小區", note: "大甲溪牧區", name: "南勢", address: "42441 台中市和平區南勢里東關路三段51之2號" },
                { zone: "中苗小區", note: "大甲溪牧區", name: "裡冷", address: "42445 台中市和平區博愛里東關路一段裡冷巷15之2號" },
                { zone: "宣傳公關", note: "大甲溪牧區", name: "博愛", address: "42445 台中市和平區博愛里東關路一段松鶴3巷71號" },
                { zone: "中苗小區", note: "大甲溪牧區", name: "環山", address: "42493臺中市和平區平等里中興路三段環山2巷48號" },
                { zone: "中苗小區", note: "大甲溪牧區", name: "(佳陽)", address: "42448台中市和平區梨山里和平路二段24號" },

                // 南投小區
                { zone: "南投小區", note: "力行線牧區", name: "翠巒", address: "54665南投縣仁愛鄉翠華村翠巒路34號" },
                { zone: "南投小區", note: "力行線牧區", name: "力行", address: "54664南投縣仁愛鄉力行村新望洋130號" },
                { zone: "南投小區", note: "力行線牧區", name: "紅香", address: "54666南投縣仁愛鄉發祥村仁盛路1號" },
                { zone: "南投小區", note: "力行線牧區", name: "慈峰", address: "54666南投縣仁愛鄉發祥村慈峰巷21號" },
                { zone: "南投小區", note: "親春線牧區", name: "親愛", address: "54653南投縣仁愛鄉親愛村親和巷松林17號" },
                { zone: "南投小區", note: "親春線牧區", name: "春陽", address: "54663南投縣仁愛鄉春陽村源泉巷24號" },
                { zone: "南投小區", note: "親春線牧區", name: "廬山", address: "54663南投縣仁愛鄉精英村富貴路53號" },
                { zone: "南投小區", note: "親春線牧區", name: "精英", address: "54663南投縣都達村平靜法治巷31號" },
                { zone: "南投小區", note: "新望愛牧區", name: "新生", address: "54670南投縣仁愛鄉新生村山林巷眉原182號" },
                { zone: "南投小區", note: "新望愛牧區", name: "仁愛", address: "54549南投縣埔里鎮枇杷里青田街42號" },
                { zone: "南投小區", note: "新望愛牧區", name: "(武界)", address: "54669南投縣仁愛鄉法治村武安路21號" },
                { zone: "南投小區", note: "新望愛牧區", name: "望美", address: "55651南投縣信義鄉望美村美信巷3之2號" }
            ];

            const zones = ['全部', '復興小區', '竹苗小區', '中苗小區', '南投小區'];

            const filteredChurches = React.useMemo(() => {
                return churchData.filter(c => {
                    const matchZone = selectedZone === '全部' || c.zone === selectedZone;
                    const matchSearch = c.name.includes(searchTerm) || c.address.includes(searchTerm) || c.note.includes(searchTerm);
                    return matchZone && matchSearch;
                });
            }, [selectedZone, searchTerm]);

            const openInGoogleMaps = (address) => {
                const encodedAddress = encodeURIComponent(address);
                window.open(`https://www.google.com/maps/search/?api=1&query=${encodedAddress}`, '_blank');
            };

            const getZoneColor = (zone) => {
                switch(zone) {
                    case '復興小區': return 'bg-amber-500';
                    case '竹苗小區': return 'bg-emerald-500';
                    case '中苗小區': return 'bg-purple-500';
                    case '南投小區': return 'bg-rose-500';
                    default: return 'bg-slate-500';
                }
            };

            return (
                <div className="flex flex-col md:flex-row w-full max-w-6xl mx-auto my-0 md:my-10 h-screen md:h-[800px] bg-slate-50 md:rounded-3xl overflow-hidden shadow-2xl border border-slate-200">
                    
                    {/* 左側面板 */}
                    <div className="w-full md:w-80 bg-white border-r border-slate-200 flex flex-col shrink-0">
                        <div className="p-6 bg-slate-900 text-white">
                            <h2 className="text-xl font-black flex items-center tracking-tight">
                                <MapIcon className="mr-2 text-indigo-400" size={22} />
                                西區教會導覽
                            </h2>
                            <p className="text-[10px] text-slate-400 mt-1 uppercase tracking-widest font-bold">Western District</p>
                        </div>

                        <div className="p-4 space-y-4 bg-slate-50 border-b border-slate-100">
                            <div className="relative">
                                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={14} />
                                <input 
                                    type="text" 
                                    placeholder="搜尋關鍵字..."
                                    className="w-full pl-9 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            <div className="flex flex-wrap gap-1">
                                {zones.map(z => (
                                    <button key={z} onClick={() => setSelectedZone(z)} className={`px-2 py-1 rounded-md text-[10px] font-bold ${selectedZone === z ? 'bg-indigo-600 text-white' : 'bg-white text-slate-500 border border-slate-200'}`}>{z}</button>
                                ))}
                            </div>
                        </div>

                        <div className="flex-grow overflow-y-auto p-2 space-y-1 custom-scrollbar">
                            {filteredChurches.map((c, i) => (
                                <button key={i} onClick={() => setActiveChurch(c)} className={`w-full text-left p-3 rounded-xl transition-all border flex items-center justify-between ${activeChurch?.name === c.name ? 'bg-indigo-50 border-indigo-300' : 'bg-white border-transparent hover:bg-slate-50'}`}>
                                    <div className="flex items-center space-x-2">
                                        <div className={`w-2 h-2 rounded-full ${getZoneColor(c.zone)}`} />
                                        <span className="text-sm font-bold text-slate-700">{c.name}</span>
                                    </div>
                                    <ChevronRight size={14} className="text-slate-300" />
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* 右側內容 */}
                    <div className="flex-grow relative bg-slate-100 overflow-hidden">
                        <div className="absolute inset-0 opacity-10 pointer-events-none" style={{ backgroundImage: 'radial-gradient(#475569 1px, transparent 0)', backgroundSize: '24px 24px' }}></div>
                        
                        <div className="absolute inset-0 flex items-center justify-center p-4">
                            {activeChurch ? (
                                <div className="w-full max-w-md bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-white animate-in fade-in zoom-in duration-300">
                                    <div className={`h-24 w-full ${getZoneColor(activeChurch.zone)}`} />
                                    <div className="p-8 -mt-12">
                                        <div className="bg-white p-3 rounded-2xl shadow-lg inline-block text-indigo-600 mb-4 border border-slate-50">
                                            <MapPin size={24} />
                                        </div>
                                        <h3 className="text-3xl font-black text-slate-900 mb-1">{activeChurch.name}</h3>
                                        <p className="text-slate-400 text-xs font-bold uppercase mb-6">{activeChurch.zone} · {activeChurch.note}</p>
                                        
                                        <div className="space-y-4 mb-8">
                                            <div className="flex items-start">
                                                <div className="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center mr-3 text-slate-400"><Navigation size={16}/></div>
                                                <p className="text-sm text-slate-600 font-medium leading-relaxed">{activeChurch.address}</p>
                                            </div>
                                        </div>

                                        <button 
                                            onClick={() => openInGoogleMaps(activeChurch.address)}
                                            className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-sm hover:bg-indigo-600 transition-all flex items-center justify-center"
                                        >
                                            <ExternalLink size={18} className="mr-2" />
                                            開啟 Google 地圖導覽
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="text-center p-10 bg-white/80 backdrop-blur-md rounded-3xl border border-white shadow-xl max-w-sm">
                                    <div className="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4"><Globe size={32}/></div>
                                    <h4 className="text-lg font-black text-slate-800">請選擇教會</h4>
                                    <p className="text-xs text-slate-500 mt-2">點選左側清單，獲取 55 間教會的精確導航標籤。</p>
                                </div>
                            )}

                </div>

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
