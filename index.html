<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真耶穌教會西區地圖標籤導航</title>
    
    <!-- 載入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 載入 React 與 Babel CDN (用於瀏覽器直接解析 JSX) -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- 載入 Lucide 圖示庫 -->

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">

        // 定義會用到的圖示組件 (從全域 lucide 物件提取)

        const App = () => {

                // 復興小區
                { zone: "復興小區", note: "前山牧區", name: "八德", address: "33448桃園市八德區瑞發街107巷5弄2號" },

                { zone: "復興小區", note: "中山牧區", name: "(卡普)", address: "33643桃園市復興區義盛里4鄰10號" },
                { zone: "復興小區", note: "中山牧區", name: "大灣", address: "33644桃園市復興區羅浮里8鄰高坡62號" },

                { zone: "復興小區", note: "後山牧區", name: "光華", address: "33644桃園市復興區華陵里6鄰18之3號" },

                // 竹苗小區

                { zone: "竹苗小區", note: "中港溪牧區", name: "東江", address: "35343苗栗縣南庄鄉南江村東江新邨25鄰50號" },
                { zone: "竹苗小區", note: "中港溪牧區", name: "(東河)", address: "35346苗栗縣南庄鄉東河村東興新邨 129之3號" },

                // 中苗小區
                { zone: "中苗小區", note: "泰安牧區", name: "永安", address: "36545 苗栗縣泰安鄉象鼻村4鄰永安34號" },
                { zone: "中苗小區", note: "泰安牧區", name: "(大安）", address: "36545 苗栗縣泰安鄉象鼻村大安38號" },
                { zone: "中苗小區", note: "泰安牧區", name: "士林", address: "36545 苗栗縣泰安鄉士林村4鄰15之2號" },

                { zone: "中苗小區", note: "東達牧區", name: "達觀", address: "42450 台中市和平區達觀里東崎路一段香川巷2號" },

                { zone: "中苗小區", note: "東達牧區", name: "自由", address: "42450 台中市和平區自由里東崎路二段三叉巷6號" },
                { zone: "中苗小區", note: "東達牧區", name: "東勢", address: "42344 台中市東勢區泰昌里泰昌二街91號" },
                { zone: "中苗小區", note: "大甲溪牧區", name: "南勢", address: "42441 台中市和平區南勢里東關路三段51之2號" },
                { zone: "中苗小區", note: "大甲溪牧區", name: "裡冷", address: "42445 台中市和平區博愛里東關路一段裡冷巷15之2號" },
                { zone: "中苗小區", note: "大甲溪牧區", name: "博愛", address: "42445 台中市和平區博愛里東關路一段松鶴3巷71號" },

                { zone: "中苗小區", note: "大甲溪牧區", name: "(佳陽)", address: "42448台中市和平區梨山里和平路二段24號" },

                // 南投小區

                { zone: "南投小區", note: "力行線牧區", name: "力行", address: "54664南投縣仁愛鄉力行村新望洋130號" },

                { zone: "南投小區", note: "親春線牧區", name: "廬山", address: "54663南投縣仁愛鄉精英村富貴路53號" },
                { zone: "南投小區", note: "親春線牧區", name: "精英", address: "54663南投縣都達村平靜法治巷31號" },

            ];

            const [searchTerm, setSearchTerm] = useState('');
            const [activeChurch, setActiveChurch] = useState(null);

            const zones = ['全部', '復興小區', '竹苗小區', '中苗小區', '南投小區'];

            const filteredChurches = useMemo(() => {
                return churchData.filter(c => {
                    const matchZone = selectedZone === '全部' || c.zone === selectedZone;
                    const matchSearch = c.name.includes(searchTerm) || c.address.includes(searchTerm) || c.note.includes(searchTerm);
                    return matchZone && matchSearch;
                });
            }, [selectedZone, searchTerm]);

            const openInGoogleMaps = (address) => {
                const encodedAddress = encodeURIComponent(address);
                window.open(`https://www.google.com/maps/search/?api=1&query=${encodedAddress}`, '_blank');
            };

            const getZoneColor = (zone) => {
                switch(zone) {
                    case '復興小區': return 'bg-amber-500';
                    case '竹苗小區': return 'bg-emerald-500';
                    case '中苗小區': return 'bg-purple-500';
                    case '南投小區': return 'bg-rose-500';
                    default: return 'bg-slate-500';
                }
            };

            return (
                <div className="flex flex-col md:flex-row w-full max-w-6xl mx-auto my-10 h-[800px] bg-slate-50 rounded-3xl overflow-hidden shadow-2xl border border-slate-200">
                    
                    {/* 左側選單 */}

                        </div>

                        <div className="p-4 space-y-4 bg-slate-50/50 border-b border-slate-100">
                            <div className="relative">
                                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={14} />
                                <input 
                                    type="text" 
                                    placeholder="搜尋教會、地址或牧區..."
                                    className="w-full pl-9 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all shadow-sm"

                                        onClick={() => setSelectedZone(zone)}

                                            ? 'bg-indigo-600 text-white shadow-md'

                                <button
                                    key={idx}
                                    onClick={() => setActiveChurch(church)}
                                    className={`w-full text-left p-4 rounded-2xl transition-all border ${
                                        activeChurch?.name === church.name 
                                        ? 'bg-indigo-50 border-indigo-400 shadow-sm' 
                                        : 'bg-white border-slate-100 hover:border-slate-300'
                                    } flex items-center justify-between group`}
                                >
                                    <div className="flex items-start space-x-3">
                                        <div className={`mt-1 w-2.5 h-2.5 rounded-full shrink-0 ${getZoneColor(church.zone)}`} />
                                        <div>
                                            <div className="text-sm font-black text-slate-800">{church.name}</div>
                                            <div className="text-[10px] text-slate-500 font-bold">{church.note}</div>
                                        </div>
                                    </div>
                                    <ChevronRight size={14} className={`text-slate-300 group-hover:translate-x-1 transition-transform ${activeChurch?.name === church.name ? 'text-indigo-500' : ''}`} />
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* 右側詳細內容 */}
                    <div className="flex-grow relative bg-[#f1f5f9] overflow-hidden">
                        <div className="absolute inset-0 bg-[radial-gradient(#cbd5e1_1px,transparent_1px)] [background-size:24px_24px] opacity-50"></div>
                        
                        <div className="absolute inset-0 flex items-center justify-center p-6">
                            {activeChurch ? (

                                    <div className={`h-32 w-full relative ${getZoneColor(activeChurch.zone)}`}>
                                        <div className="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                                        <div className="absolute -bottom-8 left-10 bg-white p-4 rounded-3xl shadow-xl border border-slate-50 text-indigo-600">

                                                <span className="text-slate-400 text-sm font-bold">{activeChurch.note}</span>

                                        </div>

                                                </div>
                                            </div>

                            <div className="flex items-center">
                                <div className="w-2.5 h-2.5 bg-green-500 rounded-full mr-2.5"></div>
                                <span className="text-[11px] font-black text-slate-700 uppercase">資料已就緒: 55 間</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
