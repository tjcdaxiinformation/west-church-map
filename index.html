<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TJC台灣傳教百年西區音樂會籌備會公關宣傳組 - 地圖導航系統</title>
    
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 載入 React 核心 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 載入 Babel (用於編譯 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 載入 Lucide React 圖示庫 -->
    <script src="https://unpkg.com/lucide-react"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
        }
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f1f5f9;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="root"></div>

    <script type="text/babel">
        // 相容性修正：自動偵測 Lucide 全域變數名稱
        const LucideIcons = window.lucideReact || window.lucide;
        const { 
            MapPin, Navigation, Search, Globe, 
            ChevronRight, Copy, Check, Map: MapIcon, Info, ShieldCheck
        } = LucideIcons;

        const App = () => {
            const [selectedZone, setSelectedZone] = React.useState('全部');
            const [searchTerm, setSearchTerm] = React.useState('');
            const [activeChurch, setActiveChurch] = React.useState(null);
            const [copied, setCopied] = React.useState(false);

            React.useEffect(() => {
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => { loader.style.display = 'none'; }, 500);
                }
            }, []);

            const churchData = [
                // 復興小區
                { zone: "復興小區", note: "前山牧區", name: "八德", address: "33448桃園市八德區瑞發街107巷5弄2號" },
                { zone: "復興小區", note: "前山牧區", name: "崎頂", address: "33546桃園市大溪區仁武里8鄰員林路一段142巷82號" },
                { zone: "復興小區", note: "前山牧區", name: "大溪", address: "33542桃園市大溪區一心里民權東路185巷31號" },
                { zone: "復興小區", note: "前山牧區", name: "復興", address: "33641桃園市復興區澤仁里16鄰詩朗7之1號" },
                { zone: "復興小區", note: "前山牧區", name: "(霞雲)", address: "33643桃園市復興區霞雲里3鄰志繼31號" },
                { zone: "復興小區", note: "中山牧區", name: "義盛", address: "33663桃園市復興區義盛里9鄰義興15號" },
                { zone: "復興小區", note: "中山牧區", name: "(卡普)", address: "33643桃園市復興區義盛里4鄰10號" },
                { zone: "復興小區", note: "中山牧區", name: "大灣", address: "33644桃園市復興區羅浮里8鄰高坡62號" },
                { zone: "復興小區", note: "中山牧區", name: "(奎輝)", address: "33643桃園市復興區奎輝里羅馬路三段397号之1" },
                { zone: "復興小區", note: "中山牧區", name: "雪霧鬧", address: "33644桃園市復興區高義里8鄰雪霧鬧12號" },
                { zone: "復興小區", note: "後山牧區", name: "上巴陵", address: "33644桃園市復興區華陵里9鄰40號" },
                { zone: "復興小區", note: "後山牧區", name: "中巴陵", address: "33644桃園市復興區華陵里8鄰39之3號" },
                { zone: "復興小區", note: "後山牧區", name: "三光", address: "33644桃園市復興區三光里6鄰5之1號" },
                { zone: "復興小區", note: "後山牧區", name: "(高義)", address: "33644桃園市復興區高義里4鄰33之7號" },
                { zone: "復興小區", note: "後山牧區", name: "光華", address: "33644桃園市復興區華陵里6鄰18之3號" },
                { zone: "復興小區", note: "後山牧區", name: "(爺亨)", address: "33644桃園市復興區爺亨32號" },
                // 竹苗小區
                { zone: "竹苗小區", note: "尖石後牧區", name: "(養老)", address: "31345新竹縣尖石鄉秀巒村13鄰立園4號" },
                { zone: "竹苗小區", note: "尖石後牧區", name: "(李埔)", address: "31343新竹縣尖石鄉玉峰村3鄰李埔16號" },
                { zone: "竹苗小區", note: "尖石後牧區", name: "那羅", address: "31341新竹縣尖石鄉錦屏村10鄰那羅104號" },
                { zone: "竹苗小區", note: "尖石前牧區", name: "錦屏", address: "31341新竹縣尖石鄉錦屏村2鄰45號" },
                { zone: "竹苗小區", note: "尖石前牧區", name: "(尖石)", address: "31342新竹縣尖石鄉嘉樂村5鄰麥樹仁272號" },
                { zone: "竹苗小區", note: "尖石前牧區", name: "義興", address: "31342新竹縣尖石鄉義興村9鄰馬胎68號" },
                { zone: "竹苗小區", note: "五峰牧區", name: "花園", address: "31141新竹縣五峰鄉花園村6鄰126之1號" },
                { zone: "竹苗小區", note: "五峰牧區", name: "五峰", address: "31141新竹縣五峰鄉大隘村10鄰五峰191號" },
                { zone: "竹苗小區", note: "五峰牧區", name: "桃山", address: "31141新竹縣五峰鄉桃山村1鄰6號" },
                { zone: "竹苗小區", note: "五峰牧區", name: "清泉", address: "31141新竹縣五峰鄉桃山村14鄰清泉228之2號" },
                { zone: "竹苗小區", note: "中港溪牧區", name: "頭份", address: "35142苗栗縣頭份市民權里光華街48號" },
                { zone: "竹苗小區", note: "中港溪牧區", name: "東江", address: "35343苗栗縣南庄鄉南江村東江新邨25鄰50號" },
                { zone: "竹苗小區", note: "中港溪牧區", name: "(東河)", address: "35346苗栗縣南庄鄉東河村東興新邨 129之3號" },
                // 中苗小區
                { zone: "中苗小區", note: "泰安牧區", name: "永安", address: "36545 苗栗縣泰安鄉象鼻村4鄰永安34號" },
                { zone: "中苗小區", note: "泰安牧區", name: "(大安）", address: "36545 苗栗縣泰安鄉象鼻村大安38號" },
                { zone: "中苗小區", note: "泰安牧區", name: "士林", address: "36545 苗栗縣泰安鄉士林村4鄰15之2號" },
                { zone: "中苗小區", note: "泰安牧區", name: "大興", address: "36543苗栗縣泰安鄉大興村6鄰南灣28號" },
                { zone: "中苗小區", note: "東達牧區", name: "達觀", address: "42450 台中市和平區達觀里東崎路一段香川巷2號" },
                { zone: "中苗小區", note: "東達牧區", name: "(竹林)", address: "42450 台中市和平區達觀里東崎路一段竹林巷78號" },
                { zone: "宣傳公關", note: "東達牧區", name: "雙崎", address: "42450 台中市和平區自由里東崎路二段62之1號" },
                { zone: "中苗小區", note: "東達牧區", name: "自由", address: "42450 台中市和平區自由里東崎路二段三叉巷6號" },
                { zone: "中苗小區", note: "東達牧區", name: "東勢", address: "42344 台中市東勢區泰昌里泰昌二街91號" },
                { zone: "中苗小區", note: "大甲溪牧區", name: "南勢", address: "42441 台中市和平區南勢里東關路三段51之2號" },
                { zone: "中苗小區", note: "大甲溪牧區", name: "裡冷", address: "42445 台中市和平區博愛里東關路一段裡冷巷15之2號" },
                { zone: "中苗小區", note: "大甲溪牧區", name: "博愛", address: "42445 台中市和平區博愛里東關路一段松鶴3巷71號" },
                { zone: "中苗小區", note: "大甲溪牧區", name: "環山", address: "42493臺中市和平區平等里中興路三段環山2巷48號" },
                { zone: "中苗小區", note: "大甲溪牧區", name: "(佳陽)", address: "42448台中市和平區梨山里和平路二段24號" },
                // 南投小區
                { zone: "南投小區", note: "力行線牧區", name: "翠巒", address: "54665南投縣仁愛鄉翠華村翠巒路34號" },
                { zone: "南投小區", note: "力行線牧區", name: "力行", address: "54664南投縣仁愛鄉力行村新望洋130號" },
                { zone: "南投小區", note: "力行線牧區", name: "紅香", address: "54666南投縣仁愛鄉發祥村仁盛路1號" },
                { zone: "南投小區", note: "力行線牧區", name: "慈峰", address: "54666南投縣仁愛鄉發祥村慈峰巷21號" },
                { zone: "南投小區", note: "親春線牧區", name: "親愛", address: "54653南投縣仁愛鄉親愛村親和巷松林17號" },
                { zone: "南投小區", note: "親春線牧區", name: "春陽", address: "54663南投縣仁愛鄉春陽村源泉巷24號" },
                { zone: "南投小區", note: "親春線牧區", name: "廬山", address: "54663南投縣精英村富貴路53號" },
                { zone: "南投小區", note: "親春線牧區", name: "精英", address: "54663南投縣都達村平靜法治巷31號" },
                { zone: "南投小區", note: "新望愛牧區", name: "新生", address: "54670南投縣仁愛鄉新生村山林巷眉原182號" },
                { zone: "南投小區", note: "新望愛牧區", name: "仁愛", address: "54549南投縣埔里鎮枇杷里青田街42號" },
                { zone: "南投小區", note: "新望愛牧區", name: "(武界)", address: "54669南投縣仁愛鄉法治村武安路21號" },
                { zone: "南投小區", note: "新望愛牧區", name: "望美", address: "55651南投縣信義鄉望美村美信巷3之2號" }
            ];

            const zones = ['全部', '復興小區', '竹苗小區', '中苗小區', '南投小區'];

            const filteredChurches = React.useMemo(() => {
                return churchData.filter(c => {
                    const mZone = selectedZone === '全部' || c.zone === selectedZone;
                    const mSearch = c.name.includes(searchTerm) || c.address.includes(searchTerm) || c.note.includes(searchTerm);
                    return mZone && mSearch;
                });
            }, [selectedZone, searchTerm]);

            const openDirections = (address) => {
                const encoded = encodeURIComponent(address);
                const url = `https://www.google.com/maps/dir/?api=1&destination=${encoded}&travelmode=driving`;
                window.open(url, '_blank');
            };

            const copyToClipboard = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const getZoneColor = (z) => {
                if (z === '復興小區') return 'bg-amber-500';
                if (z === '竹苗小區') return 'bg-emerald-500';
                if (z === '中苗小區') return 'bg-purple-500';
                if (z === '南投小區') return 'bg-rose-500';
                return 'bg-slate-400';
            };

            return (
                <div className="flex flex-col md:flex-row w-full max-w-7xl mx-auto h-screen md:h-[850px] md:my-6 bg-white md:rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
                    
                    {/* Sidebar */}
                    <div className="w-full md:w-80 border-r border-slate-100 flex flex-col shrink-0 bg-slate-50/30">
                        <div className="p-8 bg-indigo-950 text-white">
                            <div className="flex items-center gap-2 mb-3">
                                <ShieldCheck size={20} className="text-indigo-400" />
                                <span className="text-[10px] font-black uppercase tracking-[0.3em] opacity-70">Official Project</span>
                            </div>
                            <h1 className="text-lg font-black leading-tight tracking-tight">
                                TJC台灣傳教百年<br/>西區音樂會籌備會<br/>公關宣傳組
                            </h1>
                            <div className="h-1 w-12 bg-indigo-500 mt-4 rounded-full"></div>
                        </div>

                        <div className="p-5 space-y-4 border-b border-slate-100 bg-white">
                            <div className="relative">
                                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-300" size={14} />
                                <input 
                                    className="w-full pl-9 pr-4 py-2.5 bg-slate-50 border-none rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder:text-slate-300"
                                    placeholder="搜尋教會或牧區..."
                                    value={searchTerm}
                                    onChange={e => setSearchTerm(e.target.value)}
                                />
                            </div>
                            <div className="flex flex-wrap gap-1.5">
                                {zones.map(z => (
                                    <button 
                                        key={z} 
                                        onClick={() => setSelectedZone(z)}
                                        className={`px-3 py-1.5 rounded-lg text-[10px] font-black transition-all ${selectedZone === z ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-100'}`}
                                    >
                                        {z}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="flex-grow overflow-y-auto p-4 space-y-2 custom-scrollbar">
                            <div className="text-[9px] font-black text-slate-300 uppercase tracking-widest px-2 mb-2">Church Directory</div>
                            {filteredChurches.map((c, i) => (
                                <button 
                                    key={i} 
                                    onClick={() => setActiveChurch(c)}
                                    className={`w-full text-left p-4 rounded-2xl transition-all border flex items-center justify-between group ${activeChurch?.name === c.name ? 'bg-indigo-50 border-indigo-200 shadow-sm' : 'bg-white border-transparent hover:border-slate-200'}`}
                                >
                                    <div className="flex items-center gap-3">
                                        <div className={`w-2 h-2 rounded-full ${getZoneColor(c.zone)}`} />
                                        <div>
                                            <div className="text-sm font-black text-slate-800 leading-none mb-1">{c.name}</div>
                                            <div className="text-[10px] text-slate-400 font-bold">{c.note}</div>
                                        </div>
                                    </div>
                                    <ChevronRight size={14} className={`text-slate-200 group-hover:text-indigo-500 transition-all ${activeChurch?.name === c.name ? 'text-indigo-500' : ''}`} />
                                </button>
                            ))}
                        </div>
                        
                        <div className="p-4 bg-slate-900 text-[10px] text-slate-500 font-bold text-center">
                            © 2026 TJC Western District Centennial PR Group
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-grow relative bg-slate-50 flex items-center justify-center p-6">
                        <div className="absolute inset-0 opacity-[0.03] pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/grid-me.png')]"></div>
                        
                        {activeChurch ? (
                            <div className="w-full max-w-lg bg-white rounded-[3rem] shadow-[0_32px_64px_-16px_rgba(0,0,0,0.1)] border border-white overflow-hidden animate-in fade-in zoom-in duration-300">
                                <div className={`h-32 w-full relative ${getZoneColor(activeChurch.zone)}`}>
                                    <div className="absolute inset-0 bg-black/10"></div>
                                    <div className="absolute -bottom-8 left-12 bg-white p-5 rounded-3xl shadow-xl border border-slate-50 text-indigo-600">
                                        <MapPin size={32} strokeWidth={2.5} />
                                    </div>
                                </div>

                                <div className="p-12 pt-16">
                                    <div className="mb-8">
                                        <div className="flex items-center gap-2 mb-2">
                                            <span className="text-xs font-black text-indigo-500 uppercase tracking-[0.2em]">{activeChurch.zone}</span>
                                            <span className="w-1 h-1 bg-slate-300 rounded-full"></span>
                                            <span className="text-xs font-bold text-slate-400">{activeChurch.note}</span>
                                        </div>
                                        <h3 className="text-4xl font-black text-slate-900 leading-none">{activeChurch.name}</h3>
                                    </div>

                                    <div className="space-y-6 mb-12">
                                        <div className="flex items-start gap-4">
                                            <div className="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 shrink-0 mt-1"><Navigation size={18}/></div>
                                            <div>
                                                <div className="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-1">精確地址導引</div>
                                                <div className="text-slate-600 font-bold leading-relaxed">{activeChurch.address}</div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-5 gap-3">
                                        <button 
                                            onClick={() => openDirections(activeChurch.address)}
                                            className="col-span-4 bg-slate-900 text-white py-5 rounded-[1.5rem] font-black text-sm hover:bg-indigo-600 transition-all flex items-center justify-center gap-3 active:scale-[0.98] shadow-xl shadow-slate-200"
                                        >
                                            <Navigation size={20} className="text-indigo-400" />
                                            Google Maps 深度導航
                                        </button>
                                        <button 
                                            onClick={() => copyToClipboard(activeChurch.address)}
                                            className="col-span-1 bg-slate-100 text-slate-400 rounded-[1.5rem] flex items-center justify-center hover:bg-slate-200 transition-all active:scale-[0.95]"
                                            title="複製地址"
                                        >
                                            {copied ? <Check size={20} className="text-green-500" /> : <Copy size={20} />}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="text-center p-12 bg-white/60 backdrop-blur-xl rounded-[3rem] border border-white shadow-xl max-w-sm">
                                <div className="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><Globe size={32}/></div>
                                <h4 className="text-xl font-black text-slate-800">歡迎進入西區地圖導覽</h4>
                                <p className="text-xs text-slate-400 mt-3 leading-relaxed font-medium">
                                    此系統由「公關宣傳組」維護<br/>
                                    旨在提供 55 間教會的精確導覽與紀錄。<br/>
                                    請從左側清單選擇欲導航之教會。
                                </p>
                            </div>
                        )}
                        
                        <div className="absolute bottom-6 right-8 text-[10px] font-black text-slate-300 uppercase tracking-widest flex items-center gap-2">
                            <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                            System Live: 55 Church Records
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
